<!-- Título + botão de criar nova seleção -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-success">Seleções Nacionais</h2>
    <a routerLink="/teams/new" class="btn btn-success btn-lg shadow">
        <i class="bi bi-plus-circle"></i> Nova Seleção
    </a>
</div>

<!-- Lista de cards das seleções -->
<div class="row row-cols-1 row-cols-md-3 g-4">
    @for (team of teams(); track team.id) {
    <div class="col">
        <div class="card h-100 shadow-lg border-0 overflow-hidden">

            <!-- Faixa verde no topo (confederação) -->
            <div class="bg-success text-white text-center py-2 fw-bold">
                {{ team.confederation }}
            </div>

            <div class="card-body text-center p-4">
                <img [src]="team.flagUrl" class="img-fluid mb-3 rounded-3 shadow-sm" style="max-height: 120px;"
                    alt="bandeira">
                <h5 class="card-title fw-bold fs-4">{{ team.country }}</h5>
                <p class="text-muted mb-1">{{ team.coach }}</p>
                <span class="badge bg-dark fs-6">FIFA #{{ team.fifaRanking }}</span>
            </div>

            <!-- Rodapé com botões de ação -->
            <div class="card-footer bg-light d-flex justify-content-between">
                <a [routerLink]="['/teams', team.id]" class="btn btn-outline-success btn-sm">Ver detalhes</a>
                <a [routerLink]="['/teams', team.id, 'edit']" class="btn btn-outline-warning btn-sm">Editar</a>
                <button (click)="deleteTeam(team.id!)" class="btn btn-outline-danger btn-sm">🗑</button>
            </div>
        </div>
    </div>
    }
</div>

<!-- Mensagem quando não existem seleções -->
@if (teams().length === 0) {
<div class="text-center py-5 text-muted">
    <h4>Ainda não tens seleções criadas</h4>
    <p>Clica em "Nova Seleção" para começar!</p>
</div>
}
